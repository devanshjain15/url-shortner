<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Error — snip</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --blue: #2563eb;
        --text: #0f172a;
        --muted: #64748b;
        --border: #e2e8f0;
        --error: #dc2626;
        --error-light: #fef2f2;
        --white: #ffffff;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--white);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      .container {
        width: 100%;
        max-width: 480px;
        text-align: center;
      }

      .status-code {
        font-size: 5rem;
        font-weight: 800;
        letter-spacing: -0.04em;
        color: var(--error);
        line-height: 1;
        margin-bottom: 1rem;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-bottom: 0.75rem;
      }

      .message {
        font-size: 0.95rem;
        color: var(--muted);
        line-height: 1.6;
        margin-bottom: 2rem;
      }

      .divider {
        width: 40px;
        height: 3px;
        background: var(--error);
        border-radius: 2px;
        margin: 0 auto 2rem;
      }

      .actions {
        display: flex;
        gap: 1rem;
        justify-content: center;
        flex-wrap: wrap;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.75rem 1.5rem;
        border-radius: 8px;
        font-size: 0.875rem;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.15s;
      }

      .btn-primary {
        background: var(--blue);
        color: var(--white);
      }

      .btn-primary:hover {
        background: #1d4ed8;
      }

      .btn-secondary {
        background: var(--white);
        color: var(--text);
        border: 1.5px solid var(--border);
      }

      .btn-secondary:hover {
        border-color: var(--blue);
        color: var(--blue);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <p class="status-code" id="status-code">500</p>
      <div class="divider"></div>
      <h1 id="error-title">Something went wrong</h1>
      <p class="message" id="error-message">
        An unexpected error occurred. Please try again.
      </p>
      <div class="actions">
        <a href="/" class="btn btn-primary">Go home</a>
        <a href="javascript:history.back()" class="btn btn-secondary"
          >Go back</a
        >
      </div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const status = params.get("status") || "500";
      const message = params.get("message") || "An unexpected error occurred.";

      document.getElementById("status-code").textContent = status;
      document.getElementById("error-message").textContent = message;

      const titles = {
        400: "Bad request",
        404: "Page not found",
        429: "Too many requests",
        500: "Something went wrong",
      };
      document.getElementById("error-title").textContent =
        titles[status] || "Something went wrong";
    </script>
  </body>
</html>
